version: '3.8'

services:
  # WhatsApp Gateway Application
  whatsapp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOG_LEVEL=debug
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=whatsapp_user
      - DB_PASSWORD=whatsapp_pass
      - DB_NAME=whatsapp_gateway
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redispass
      - REDIS_DB=0
      - ENCRYPTION_KEY=0bc264519811235554bdf578d440cd9ca16e7acfa766fc424538538e4bc80070
      - ENCRYPTION_IV=abb944e4035b435db4a337f03f3e38d1
      - API_KEY=0bc264519811235554bdf578d40934nfiesn7acfa766fc424538538e4bc80070
      - JWT_SECRET=0bc264519811paneyr37ns78d440cd9ca16e7acfa766fc424538538e4bc80070
      - JWT_EXPIRY=24h
      - CORS_ORIGIN=*
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MySQL Database
  mysql:
    image: mysql:latest
    container_name: whatsapp-gateway-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_USER=whatsapp_user
      - MYSQL_PASSWORD=whatsapp_pass
      - MYSQL_DATABASE=whatsapp_gateway
      - TZ=UTC
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - whatsapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "whatsapp_user", "-pwhatsapp_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: whatsapp-gateway-redis
    command: redis-server --appendonly yes --requirepass redispass
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
  admin:
      image: adminer
      container_name: whatsapp-gateway-adminer
      ports:
        - "8082:8080"
      networks:
        - whatsapp-network
      restart: unless-stopped 

  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      container_name: whatsapp-gateway-phpmyadmin
      environment:
        - PMA_HOST=mysql
        - PMA_USER=whatsapp_user
        - PMA_PASSWORD=whatsapp_pass
      ports:
        - "8083:80"
      networks:
        - whatsapp-network
      restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  whatsapp-network:
    driver: bridge
